<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>垃圾分类查询百科</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --bg-card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --primary: #3b82f6;
      --primary-light: #eff6ff;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --recycle: #2563eb;
      --recycle-bg: #dbeafe;
      --harmful: #dc2626;
      --harmful-bg: #fee2e2;
      --kitchen: #16a34a;
      --kitchen-bg: #dcfce7;
      --other: #6b7280;
      --other-bg: #f3f4f6;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --border: #334155;
      --primary: #60a5fa;
      --primary-light: #1e3a5f;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.4);
      --recycle-bg: #1e3a5f;
      --harmful-bg: #4c1d1d;
      --kitchen-bg: #14432a;
      --other-bg: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      min-height: 100vh;
    }

    #root { min-height: 100vh; display: flex; flex-direction: column; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
      width: 100%;
    }

    /* Header */
    .header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .header-title .icon {
      font-size: 24px;
    }

    .theme-toggle {
      background: var(--border);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: var(--text);
    }

    .theme-toggle:hover {
      background: var(--primary);
      color: #fff;
    }

    /* Nav */
    .nav {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-btn {
      padding: 8px 16px;
      border: none;
      background: none;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      transition: all 0.2s;
    }

    .nav-btn:hover { background: var(--primary-light); color: var(--primary); }
    .nav-btn.active { background: var(--primary); color: #fff; font-weight: 600; }

    /* Search */
    .search-box {
      position: relative;
      margin: 20px 0 12px;
    }

    .search-input {
      width: 100%;
      padding: 14px 48px 14px 44px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      background: var(--bg-card);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--primary); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 18px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
    }

    /* Category cards */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    @media (max-width: 600px) {
      .category-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .category-card {
      padding: 20px 16px;
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
    }

    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .category-card .emoji { font-size: 36px; margin-bottom: 8px; }
    .category-card .name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .category-card .desc { font-size: 12px; opacity: 0.7; }

    .cat-recycle { background: var(--recycle-bg); color: var(--recycle); border-color: var(--recycle); }
    .cat-harmful { background: var(--harmful-bg); color: var(--harmful); border-color: var(--harmful); }
    .cat-kitchen { background: var(--kitchen-bg); color: var(--kitchen); border-color: var(--kitchen); }
    .cat-other { background: var(--other-bg); color: var(--other); border-color: var(--other); }

    /* Result list */
    .result-list { margin-top: 8px; }

    .result-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
      border-left: 4px solid transparent;
    }

    .result-item:hover { transform: translateX(4px); }
    .result-item.recycle-border { border-left-color: var(--recycle); }
    .result-item.harmful-border { border-left-color: var(--harmful); }
    .result-item.kitchen-border { border-left-color: var(--kitchen); }
    .result-item.other-border { border-left-color: var(--other); }

    .result-item .info { flex: 1; }
    .result-item .name { font-size: 15px; font-weight: 600; }
    .result-item .tip { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .tag-recycle { background: var(--recycle-bg); color: var(--recycle); }
    .tag-harmful { background: var(--harmful-bg); color: var(--harmful); }
    .tag-kitchen { background: var(--kitchen-bg); color: var(--kitchen); }
    .tag-other { background: var(--other-bg); color: var(--other); }

    /* Detail page */
    .detail-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .detail-emoji { font-size: 48px; }

    .detail-title { font-size: 22px; font-weight: 700; }
    .detail-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-box {
      padding: 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .info-box-blue { background: var(--recycle-bg); color: var(--recycle); }
    .info-box-red { background: var(--harmful-bg); color: var(--harmful); }
    .info-box-green { background: var(--kitchen-bg); color: var(--kitchen); }
    .info-box-gray { background: var(--other-bg); color: var(--other); }

    .error-list {
      list-style: none;
      padding: 0;
    }

    .error-list li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .error-list li:last-child { border-bottom: none; }

    /* Guide cards */
    .guide-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      .guide-grid { grid-template-columns: 1fr; }
    }

    .guide-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border-top: 4px solid;
    }

    .guide-card .emoji { font-size: 40px; margin-bottom: 12px; }
    .guide-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .guide-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .guide-card .examples {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .guide-card .example-tag {
      background: var(--primary-light);
      color: var(--primary);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* Photo search */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg-card);
    }

    .upload-area:hover { border-color: var(--primary); background: var(--primary-light); }

    .upload-area .icon { font-size: 48px; margin-bottom: 12px; }

    .upload-preview {
      width: 100%;
      max-width: 300px;
      border-radius: var(--radius-sm);
      margin: 16px auto;
      display: block;
    }

    /* History */
    .history-section {
      margin-top: 20px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .history-header h3 {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .history-clear-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
    }

    .history-clear-btn:hover { color: var(--harmful); }

    .history-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .history-tag {
      padding: 6px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .history-tag:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-outline {
      background: none;
      border: 2px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    .btn-back {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    .stat-item {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .stat-item strong { color: var(--text); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Animate */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: auto;
    }

    /* Confidence bar */
    .confidence-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }

    .confidence-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Hidden file input */
    .hidden-input { display: none; }

    /* Keyword highlight */
    .highlight { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
